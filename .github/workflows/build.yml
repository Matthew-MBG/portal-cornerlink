name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build mod
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew clean build --no-daemon

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: matthew_mbg-cornerlink-neoforge
          path: |
            build/libs/matthew_mbg-cornerlink-neoforge-*.jar
            !build/libs/*-sources.jar
          if-no-files-found: error
